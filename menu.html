<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — Grounded Café</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>" />
</head>
<body>

<!-- ═══════════════ NAVBAR ═══════════════ -->
<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Grounded<span>.</span></a>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="cart-btn">
        🛒 <span class="nav-btn-text">Cart</span>
        <span class="cart-count" style="display:none">0</span>
      </a>
      <a href="menu.html" class="btn btn-primary btn-sm">Order Now</a>
    </div>
  </div>
</nav>

<!-- ═══════════════ PAGE HEADER ═══════════════ -->
<div class="page-header">
  <div class="container">
    <h1>Our Menu</h1>
    <p>Crafted with care. Sourced with intention. Served with love.</p>
  </div>
</div>

<!-- ═══════════════ MENU SECTION ═══════════════ -->
<section class="section-pad">
  <div class="container">

    <!-- Search bar -->
    <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;">
      <div style="position:relative;flex:1;min-width:220px;">
        <span style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted);">🔍</span>
        <input
          type="text"
          id="menu-search"
          class="form-control"
          placeholder="Search drinks & food…"
          style="padding-left:2.5rem;"
        />
      </div>
    </div>

    <!-- Category filters -->
    <div class="menu-categories" id="categories">
      <!-- JS rendered -->
    </div>

    <!-- Menu grid -->
    <div class="menu-grid" id="menu-grid">
      <!-- JS rendered -->
    </div>

  </div>
</section>

<!-- ═══════════════ FOOTER ═══════════════ -->
<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="border-top:none;padding-top:0;">
      <span>© 2024 Grounded Café</span>
      <a href="index.html" style="color:rgba(255,255,255,0.6)">← Back to Home</a>
    </div>
  </div>
</footer>

<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="cart.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const emojis = { Coffee:'☕', Tea:'🍵', Food:'🥗', Pastries:'🥐', Drinks:'🧃' };

  let allItems = [];
  let activeCategory = 'All';
  let searchQuery = '';

  async function loadMenu() {
    const grid = document.getElementById('menu-grid');
    const cats = document.getElementById('categories');

    grid.innerHTML = Array(8).fill(0).map(() => `
      <div class="card menu-card">
        <div class="skeleton" style="height:180px"></div>
        <div style="padding:1.2rem">
          <div class="skeleton" style="height:11px;width:50%;margin-bottom:8px"></div>
          <div class="skeleton" style="height:18px;margin-bottom:8px"></div>
          <div class="skeleton" style="height:12px;margin-bottom:4px"></div>
          <div class="skeleton" style="height:12px;width:65%"></div>
        </div>
      </div>
    `).join('');

    const { data, error } = await db.from('menu_items').select('*').order('category').order('name');

    if (error) {
      grid.innerHTML = `<p style="grid-column:1/-1;color:var(--accent);text-align:center;padding:3rem">
        Could not load menu. Check your Supabase configuration.
      </p>`;
      return;
    }

    allItems = data || [];

    const categories = ['All', ...new Set(allItems.map(i => i.category))];
    cats.innerHTML = categories.map(c => `
      <button class="cat-btn ${c === 'All' ? 'active' : ''}" data-cat="${c}">${c}</button>
    `).join('');

    cats.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        cats.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        renderItems();
      });
    });

    renderItems();
  }

  function renderItems() {
    const grid = document.getElementById('menu-grid');
    let filtered = activeCategory === 'All' ? allItems : allItems.filter(i => i.category === activeCategory);

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(i =>
        i.name.toLowerCase().includes(q) ||
        (i.description || '').toLowerCase().includes(q)
      );
    }

    if (!filtered.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--text-muted)">
        <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
        <p>No items found. Try a different filter.</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(item => `
      <div class="card menu-card">
        <div class="menu-card-img">
          ${item.image_url
            ? `<img src="${item.image_url}" alt="${item.name}" loading="lazy" />`
            : `<span>${emojis[item.category] || '🍽️'}</span>`}
          ${!item.available ? `<div class="sold-out-overlay">Sold Out</div>` : ''}
        </div>
        <div class="menu-card-body">
          <div class="menu-card-cat">${item.category}</div>
          <div class="menu-card-name">${item.name}</div>
          <div class="menu-card-desc">${item.description || ''}</div>
          <div class="menu-card-footer">
            <span class="menu-price">$${Number(item.price).toFixed(2)}</span>
            <button class="add-to-cart"
              data-id="${item.id}"
              data-name="${item.name}"
              data-price="${item.price}"
              data-category="${item.category}"
              ${!item.available ? 'disabled' : ''}
            >+</button>
          </div>
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('.add-to-cart:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        Cart.add({ id: btn.dataset.id, name: btn.dataset.name, price: parseFloat(btn.dataset.price), category: btn.dataset.category });
        btn.textContent = '✓';
        btn.style.background = 'var(--primary)';
        setTimeout(() => { btn.textContent = '+'; btn.style.background = ''; }, 800);
      });
    });
  }

  // Search
  document.getElementById('menu-search').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderItems();
  });

  loadMenu();
</script>
</body>
</html>
